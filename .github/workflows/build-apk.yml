name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read # إضافة صلاحية قراءة الحزم (احتياطياً)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          # التعديل الأهم هنا: استخدام السر الذي يحتوي على التوكن الحقيقي
          GITHUB_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}
        run: ./gradlew :demo-app:assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: atheer-demo-debug-apk
          path: demo-app/build/outputs/apk/debug/*.apk
          retention-days: 30
